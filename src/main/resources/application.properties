geneservice.elasticsearch.index-prefix=geneservice
geneservice.main-species=Tcas

%dev.geneservice.elasticsearch.delete-on-start.genomiclocations=false
%dev.geneservice.elasticsearch.delete-on-start.sequences=false
%dev.geneservice.elasticsearch.delete-on-start.synonyms=false
%dev.geneservice.elasticsearch.delete-on-start.orthology=false
%dev.geneservice.elasticsearch.delete-on-start.dsrnas=false

geneservice.data-dir=./data
%prod.geneservice.data-dir=/data

quarkus.elasticsearch.hosts=0.0.0.0:9200
quarkus.elasticsearch.socket-timeout=120s
%prod.quarkus.elasticsearch.hosts=es:9200

quarkus.http.cors=true
quarkus.http.cors.origins=*

%dev.quarkus.log.category."ibb.api.geneservice".level=DEBUG

quarkus.container-image.registry=docker.gitlab.gwdg.de
quarkus.container-image.group=ibb/api
